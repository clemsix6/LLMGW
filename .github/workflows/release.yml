name: Release

# On a version tag (vX.Y.Z), build the gateway image and push it to GHCR. The deployable unit is
# the image: the server pulls a pinned tag (docker compose pull && up -d), so deploys are
# reproducible and rollback is "redeploy the previous tag". GITHUB_TOKEN with packages:write is the
# only credential needed. Single-arch (linux/amd64) — the server is amd64-only.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push GHCR image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/clemsix6/llmgw
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
