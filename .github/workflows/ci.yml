name: CI

# One job:
#   - check: build, vet, gofmt, unit tests. Hermetic (Postgres via testcontainers, no live provider).
#     Runs on every push to main and every pull request.
#
# The real-Anthropic E2E job was removed on 2026-07-17: Anthropic now rejects the session-key OAuth
# bootstrap (the authorize step) with 403 session_stale_relogin, so the suite can no longer mint
# tokens in CI and reddened main for an infra reason unrelated to the code under test. The E2E tests
# themselves still live in test/e2e/ and run locally once a valid credential is seeded. The Codex E2E
# lives in e2e-codex.yml (manual-only).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Build, vet & unit tests
    runs-on: ubuntu-latest
    env:
      # CI runners are ephemeral; the testcontainers reaper is unnecessary and flaky there.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: unit tests
        run: go test -race ./internal/... -count=1
